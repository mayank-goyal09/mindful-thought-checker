name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  # Allows manual runs from the GitHub Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Clone the existing Hugging Face Space (without downloading LFS files to save time)
          git config --global filter.lfs.smudge "git-lfs smudge --skip"
          git config --global filter.lfs.required false
          git clone https://mayankg09:$HF_TOKEN@huggingface.co/spaces/mayankg09/mindful-thought-checker hf_space
          
          # 2. Copy the updated code files into the cloned Space folder
          cp -r app hf_space/
          cp requirements.txt hf_space/
          cp run.py hf_space/
          cp README.md hf_space/
          
          # 3. Commit and push back to Hugging Face
          cd hf_space
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          
          # Only commit and push if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Automated deployment from GitHub Actions"
            git push origin main
          else
            echo "No changes to deploy."
          fi
